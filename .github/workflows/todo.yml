name: "[Post-merge] Smart TODO Tracker"

on:
  pull_request:
    branches: [main]
    types: [closed]
  push:
    branches: [main]

# This workflow is intentionally post-merge automation.

jobs:
  smart-todo:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Post-merge intent
        run: |
          echo "::notice::Running Smart TODO Tracker on merged PR #${{ github.event.pull_request.number }} at ${GITHUB_SHA}."

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Pin Yarn version
        run: |
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Resolve repo token strategy
        run: |
          if [ -z "${{ secrets.PERSONAL_ACCESS_TOKEN }}" ]; then
            echo "::warning::PERSONAL_ACCESS_TOKEN is not set. Falling back to GITHUB_TOKEN."
          fi

      - run: yarn install --immutable
      - run: yarn prepare

      - name: Run Smart TODO Action
        uses: ./
        with:
          repo-token: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' && secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          issue-title-template: src/templates/issueTitle.txt
          issue-body-template: src/templates/issueBody.md
          report: 'true'
          structured: 'true'
          llm: 'false'
          limit: 50
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload TODO report
        uses: actions/upload-artifact@v7
        with:
          name: todo-report
          path: TODO_REPORT.md

      - name: Generate Changelog from TODOs
        run: yarn changelog

      - name: Report generated changelog delta
        run: |
          echo "::notice::TODO report and changelog were generated as workflow outputs. No commit/PR is created automatically."
  
