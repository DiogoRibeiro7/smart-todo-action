name: Publish Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview release actions without creating tags/releases'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Run this workflow from the main branch."
            exit 1
          fi

      - name: Resolve release tag from package version
        id: version
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "::notice::Dry-run enabled. Will simulate release creation for ${TAG}."
          else
            echo "::notice::Preparing release for ${TAG}"
          fi

      - name: Create tag when missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.version.outputs.dry_run }}" = "true" ]; then
            echo "::notice::Dry-run: tag creation skipped."
            echo "::notice::Would run: git tag '${{ steps.version.outputs.tag }}'"
            exit 0
          fi

          TAG="${{ steps.version.outputs.tag }}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "::notice::Tag ${TAG} already exists."
          else
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Generate branch-aware release notes
        run: node scripts/generateReleaseNotes.js
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BRANCH: ${{ github.ref_name }}
          RELEASE_TO_REF: HEAD
          RELEASE_NOTES_PATH: RELEASE_NOTES.md

      - name: Create GitHub release when missing
        env:
          GH_TOKEN: ${{ github.token }}
        if: ${{ steps.version.outputs.dry_run != 'true' }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists."
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file RELEASE_NOTES.md
          fi

      - name: Move stable major tag (v1, v2, ...)
        env:
          GH_TOKEN: ${{ github.token }}
        if: ${{ steps.version.outputs.dry_run != 'true' }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! [[ "${TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::notice::Skipping major tag move for non-semver tag '${TAG}'."
            exit 0
          fi

          RELEASE_SHA=$(git rev-parse "${TAG}^{commit}")
          MAJOR_TAG="v${BASH_REMATCH[1]}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          MAJOR_CURRENT_SHA=$(git ls-remote --refs --hash origin "refs/tags/${MAJOR_TAG}" | awk 'NR==1 {print $1}')
          if [ "${MAJOR_CURRENT_SHA}" = "${RELEASE_SHA}" ]; then
            echo "::notice::Major tag ${MAJOR_TAG} already points to ${TAG} (${RELEASE_SHA})."
            exit 0
          fi

          echo "::notice::Updating ${MAJOR_TAG} -> ${TAG} (${RELEASE_SHA})"
          git tag -fa "${MAJOR_TAG}" "${TAG}" -m "Advance ${MAJOR_TAG} to ${TAG}"
          git push origin "${MAJOR_TAG}" --force
