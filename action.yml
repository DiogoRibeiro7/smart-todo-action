name: 'Smart TODO Action'
description: 'A  GitHub Action that scans your codebase for inline TODOs, FIXMEs, and BUG comments, and automatically creates GitHub Issues — with support for labels, metadata parsing, and semantic enrichment.'
author: 'Diogo Ribeiro'

inputs:
  repo-token:
    required: true
    description: GitHub token to create issues

  report:
    required: false
    description: Whether to generate a TODO markdown report
    default: 'false'

  json-report:
    required: false
    description: Whether to generate a JSON TODO report (TODO_REPORT.json)
    default: 'false'

  dry-run:
    required: false
    description: Preview mode; do not create or update GitHub issues
    default: 'false'

  structured:
    required: false
    description: Use structured tag extraction with @assignee, #module, and key=value
    default: 'false'

  warn-overdue:
    required: false
    description: Emit warnings for TODOs with due dates in the past
    default: 'false'

  stale-enabled:
    required: false
    description: Enable auto-stale processing for managed TODO issues
    default: 'false'

  stale-days:
    required: false
    description: Days of inactivity before applying the stale label/comment
    default: '30'

  stale-label:
    required: false
    description: Label to add to inactive managed TODO issues
    default: 'stale'

  stale-comment:
    required: false
    description: Comment posted when marking an issue as stale
    default: 'This issue has been marked as stale due to inactivity.'

  stale-close-days:
    required: false
    description: Days to keep an issue stale before closing it
    default: '7'

  stale-close-comment:
    required: false
    description: Comment posted before closing a stale issue
    default: 'Closing this issue as stale after repeated inactivity.'

  stale-managed-labels:
    required: false
    description: Comma-separated labels identifying issues managed by this action
    default: 'enhancement,bug,technical-debt'

  issue-title-template:
    required: false
    description: Optional path to custom issue title template

  issue-body-template:
    required: false
    description: Optional path to custom issue body template

  label-config:
    required: false
    description: Optional path to JSON file with custom label colors and descriptions

  ignore-globs:
    required: false
    description: Optional comma-separated glob patterns to ignore while scanning files
    default: ''

  llm:
    required: false
    description: Use LLM to generate issue titles and bodies
    default: 'false'

  llm-provider:
    required: false
    description: LLM provider to use (`openai` or `gemini`)
    default: openai

  openai-api-key:
    required: false
    description: 'OpenAI API key used when `llm` is true'
    secret: true

  openai-model:
    required: false
    description: OpenAI model to use (e.g., `gpt-3.5-turbo`, `gpt-4`)
    default: gpt-3.5-turbo

  gemini-api-key:
    required: false
    description: Gemini API key used when `llm-provider` is `gemini`
    secret: true

  gemini-model:
    required: false
    description: Gemini model to use (e.g., `gemini-1.5-pro`)
    default: gemini-1.5-pro

  sync-to-jira:
    required: false
    default: 'false'
    description: Enable Jira sync for created TODOs

  jira-api-token:
    required: false
    description: Jira API token or personal access token
    secret: true

  jira-base-url:
    required: false
    description: Base URL of your Jira instance (e.g. https://mycompany.atlassian.net)

  jira-email:
    required: false
    description: Email used in conjunction with the Jira API token

  limit:
    required: false
    description: Maximum number of issues to create
    default: '5'

  todo-keywords:
    required: false
    description: Optional comma-separated extra TODO tags (e.g., NOTE,PERF)
    default: ''

  dedup-strategy:
    required: false
    description: Dedup mode for matching TODOs/issues (title, normalized-text, hash)
    default: 'title'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'blue'
