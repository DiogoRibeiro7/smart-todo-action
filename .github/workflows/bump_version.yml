name: Bump Package Version

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        env:
          YARN_ENABLE_HARDENED_MODE: "0"
        run: yarn install --no-immutable

      - name: Bump version
        run: yarn bump-version

      - name: Resolve PR token strategy
        run: |
          if [ -z "${{ secrets.PERSONAL_ACCESS_TOKEN }}" ]; then
            echo "::warning::PERSONAL_ACCESS_TOKEN is not set. PR creation may fail if GitHub Actions PR creation is disabled."
          fi

      - name: Commit and open PR for version bump
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' && secrets.PERSONAL_ACCESS_TOKEN || github.token }}
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            if git diff --cached --quiet; then
              echo "No version change."
            else
              VERSION=$(node -p "require('./package.json').version")
              BRANCH="chore/release-bump-v${VERSION}-${GITHUB_RUN_ID}"
              git checkout -b "${BRANCH}"
              git commit -m "chore(release): bump version to v${VERSION} [skip ci]"
              git push origin "${BRANCH}"
              gh pr create --base main --head "${BRANCH}" --title "chore(release): bump version to v${VERSION}" --body "Automated version bump generated after merge to main."
            fi
