name: Publish Release

on:
  workflow_dispatch:

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Run this workflow from the main branch."
            exit 1
          fi

      - name: Resolve release tag from package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "::notice::Preparing release for ${TAG}"

      - name: Create tag when missing
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "::notice::Tag ${TAG} already exists."
          else
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Generate branch-aware release notes
        run: node scripts/generateReleaseNotes.js
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BRANCH: ${{ github.ref_name }}
          RELEASE_TO_REF: HEAD
          RELEASE_NOTES_PATH: RELEASE_NOTES.md

      - name: Create GitHub release when missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists."
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file RELEASE_NOTES.md
          fi
